<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>WoW Player Lookup</title>
  <style>
    /*
       --- NATIVE SCALING APPLIED (~150%) ---
       Base fonts and paddings have been increased.
    */
    body {
      font-family: monospace;
      background: #121212;
      color: #ccc;
      margin: 0;
      padding: 0;
      font-size: 16px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Custom Scrollbars */
    ::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    ::-webkit-scrollbar-track {
      background: #1a1a1a;
    }

    ::-webkit-scrollbar-thumb {
      background: #444;
      border-radius: 5px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #666;
    }

    /* Layout Containers */
    #startup-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.3s ease;
    }

    #app-container {
      display: none;
      flex: 1;
      flex-direction: row;
      overflow: hidden;
    }

    #left-pane {
      flex: 1;
      overflow-y: auto;
      padding: 25px;
      background: #1a1a1a;
    }

    #right-pane {
      width: 350px;
      min-width: 350px;
      background: #161616;
      border-left: 1px solid #333;
      overflow-y: auto;
      padding: 0;
      box-shadow: -5px 0 20px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
    }

    /* Controls */
    .controls-wrapper {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      background: #222;
      padding: 20px;
      border: 1px solid #444;
      border-radius: 8px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    }

    .compact-controls {
      background: transparent;
      padding: 0;
      border: none;
      box-shadow: none;
    }

    .peeking-table th:nth-child(1) {
      min-width: 200px;
    }

    /* Player */
    .peeking-table th:nth-child(2) {
      min-width: 45px;
    }

    /* Role */
    .peeking-table th:nth-child(3) {
      min-width: 195px;
    }

    /* Class / iLvl */
    .peeking-table th:nth-child(4) {
      min-width: 110px;
    }

    /* Top Seasons */
    .peeking-table th:nth-child(5) {
      min-width: 80px;
    }

    /* CE/AOTC/KSM */
    .peeking-table th:nth-child(6) {
      min-width: 100px;
    }

    /* Time Remaining */
    .peeking-table th:nth-child(7) {
      min-width: 60px;
    }

    /* Recency */
    .peeking-table th:nth-child(8) {
      min-width: 65px;
    }

    /* Score */
    .peeking-table th:nth-child(9) {
      min-width: 350px;
    }

    /* Dungeons */

    table {
      border-collapse: collapse;
      width: 100%;
      font-size: 15px;
    }

    th,
    td {
      border: 1px solid #333;
      padding: 6px 10px;
      text-align: left;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    th {
      background: #252525;
      color: #fff;
      cursor: pointer;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
      user-select: none;
    }

    th:hover {
      background: #333;
    }

    tr {
      cursor: pointer;
      transition: background 0.1s;
    }

    tr:hover {
      background: #2a2a2a;
    }

    tr.selected-row {
      background: #233547 !important;
      outline: 1px solid #4a75a3;
    }

    .status-text {
      margin-left: 15px;
      color: #aaa;
    }

    .role-dps {
      color: #ff7070;
    }

    .role-heal {
      color: #70ff70;
    }

    .role-tank {
      color: #7070ff;
    }

    button {
      background: #333;
      color: #ccc;
      border: 1px solid #555;
      padding: 9px 18px;
      cursor: pointer;
      margin-right: 6px;
      font-size: 16px;
      border-radius: 4px;
      transition: background 0.2s, border-color 0.2s;
    }

    button:hover {
      background: #4a4a4a;
      border-color: #777;
    }

    input[type="text"] {
      background: #1a1a1a;
      color: #ccc;
      border: 1px solid #555;
      padding: 9px;
      font-family: monospace;
      font-size: 16px;
      width: 375px;
      border-radius: 4px;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #888;
    }

    progress {
      width: 450px;
      height: 20px;
      accent-color: #4a75a3;
    }

    /* Inspector Side Panel */
    #inspector-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      width: 100%;
      color: #eee;
      text-align: center;
      font-size: 18px;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      box-sizing: border-box;
      padding: 20px;
    }

    .placeholder-text {
      background: rgba(18, 18, 18, 0.85);
      padding: 20px;
      border-radius: 8px;
      border: 1px solid #333;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
    }

    #inspector-content {
      padding: 25px;
      white-space: pre-wrap;
      font-size: 15px;
      color: #ddd;
    }

    .run-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 6px;
    }

    .run-table th,
    .run-table td {
      border: 1px solid #333;
      padding: 6px 10px;
      font-size: 14.5px;
    }

    .run-table th {
      background: #222;
    }
  </style>
</head>

<body>
  <!-- Centered Startup View -->
  <div id="startup-container">
    <h1 style="font-size: 54px; margin: 0 0 10px 0; text-shadow: 2px 2px 4px #000; color: #fff;">WoW Rio Peeking</h1>
    <p style="color: #888; margin-bottom: 30px; font-size: 18px;">Fast, information-dense M+ group screening</p>

    <div class="controls-wrapper">
      <button onclick="loadFromFile()">Load input.json</button>
      <input type="file" id="fileInput" accept=".json" style="display:none" onchange="handleFile(event)">
      <span style="color:#666; font-weight:bold;">OR</span>
      <input type="text" id="textInput" placeholder="Paste JSON here...">
      <button onclick="loadFromText()">Parse JSON</button>
    </div>

    <div id="startup-status" class="status-text" style="margin-top: 25px; font-size: 18px;">No data loaded.</div>
    <div id="startup-progress-area" style="display:none; align-items:center; gap:10px; margin-top: 15px;">
      <progress id="startup-prog" value="0" max="100"></progress>
      <span id="startup-prog-label"></span>
    </div>
  </div>

  <!-- Main App View (Split Pane) -->
  <div id="app-container">
    <div id="left-pane">
      <div
        style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid #333;">
        <h2 style="margin:0; font-size: 28px; color: #fff;">WoW Rio Peeking</h2>
        <div class="controls-wrapper compact-controls">
          <button onclick="loadFromFile()">Load input.json</button>
          <span style="color:#555; font-weight:bold;">OR</span>
          <input type="text" id="app-textInput" placeholder="Paste JSON here...">
          <button onclick="loadFromText(true)">Parse JSON</button>
          <span id="app-status" class="status-text"></span>
        </div>
      </div>

      <div id="app-progress-area" style="display:none; align-items:center; gap:10px; margin-bottom: 20px;">
        <progress id="app-prog" value="0" max="100"></progress>
        <span id="app-prog-label"></span>
      </div>

      <div id="table-area-group"></div>
      <br><br>
      <div id="table-area-queue"></div>
    </div>

    <div id="right-pane">
      <div id="inspector-placeholder">
        <div class="placeholder-text">Select a player from the table<br>to view detailed information.</div>
      </div>

      <div id="inspector-content" style="display:none;">
        <h2 id="inspector-title" style="margin-top:0; color:#fff; border-bottom: 1px solid #333; padding-bottom: 10px;">
        </h2>
        <div id="inspector-body"></div>
      </div>
    </div>
  </div>

  <script>
    const apiDataReady = initApiData();

    const GEAR_WEIGHTS = {
      head: 1.00, chest: 1.00, legs: 1.00,
      shoulder: 0.75, hands: 0.75, waist: 0.75, feet: 0.75,
      wrist: 0.5625, back: 0.5625,
      neck: 0.70, finger1: 0.70, finger2: 0.70,
      trinket1: 0.80, trinket2: 0.80,
      mainhand: 1.83, offhand: 1.08,
      twohand: 2.91
    };

    const GEM_CONFIG = { requiredSlots: ["neck", "finger1", "finger2"], penaltyMissing: 0.5, bonusExtra: 0.5 };
    const ENCHANT_CONFIG = {
      mainhand: { penalty: 2.0, flags: true }, chest: { penalty: 2.0, flags: true },
      legs: { penalty: 2.0, flags: true }, finger1: { penalty: 1.0, flags: true },
      finger2: { penalty: 1.0, flags: true }, head: { penalty: 0.5, flags: false },
      feet: { penalty: 0.5, flags: false }, shoulder: { penalty: 0.5, flags: false }
    };

    const CLASS_COLORS = {
      "Death Knight": "#C41E3A", "Demon Hunter": "#A330C9", "Druid": "#FF7C0A",
      "Evoker": "#33937F", "Hunter": "#AAD372", "Mage": "#3FC7EB",
      "Monk": "#00FF98", "Paladin": "#F48CBA", "Priest": "#FFFFFF",
      "Rogue": "#FFF468", "Shaman": "#0070DD", "Warlock": "#8788EE",
      "Warrior": "#C69B6D"
    };

    const CLASS_SHORT = { "Death Knight": "DK", "Demon Hunter": "DH" };
    const SPEC_SHORT = {
      "Guardian": "Bear", "Restoration": "Resto", "Discipline": "Disc",
      "Devastation": "Dev", "Preservation": "Pres", "Augmentation": "Aug",
      "Beast Mastery": "BM", "Marksmanship": "MM", "Survival": "Surv",
      "Brewmaster": "Brew", "Windwalker": "Wind", "Mistweaver": "Mist",
      "Protection": "Prot", "Retribution": "Ret", "Enhancement": "Enh",
      "Elemental": "Ele", "Assassination": "Sin", "Subtlety": "Sub",
      "Destruction": "Destro", "Affliction": "Aff", "Demonology": "Demo",
    };
    const RIO_API = "https://raider.io/api/v1/characters/profile";

    let allPlayersGroup = [];
    let allPlayersQueue = [];
    let rawDataStore = {};
    let sortCol = null;
    let sortAsc = true;
    let isAppViewActive = false;

    let CURRENT_SEASON = "";
    let DUNGEON_TIMERS = {};
    let DUNGEON_ORDER = [];
    let FIELDS = "";
    const cutoffsCache = {};

    let basePastSeasons = [
      "season-sl-3", "season-sl-4",
      "season-df-1", "season-df-2", "season-df-3", "season-df-4",
      "season-tww-1", "season-tww-2", "season-tww-3"
    ];

    function getSeasonCutoffs(region, season) {
      const key = `${region.toLowerCase()}-${season}`;
      if (cutoffsCache[key]) return cutoffsCache[key];

      const promise = fetch(`https://raider.io/api/v1/mythic-plus/season-cutoffs?season=${season}&region=${region}`)
        .then(res => res.ok ? res.json() : null)
        .then(data => {
          if (data && data.cutoffs) {
            const c = data.cutoffs;
            const graph = c.graphData;
            function peakY(series) { return (series && series.data && series.data.length > 0) ? Math.max(...series.data.map(d => d.y)) : null; }
            return [
              (graph && peakY(graph.p999)) || c.p999?.all?.quantileMinValue || null,
              (graph && peakY(graph.p990)) || c.p990?.all?.quantileMinValue || null,
              (graph && peakY(graph.p900)) || c.p900?.all?.quantileMinValue || null,
              (graph && peakY(graph.p750)) || c.p750?.all?.quantileMinValue || null,
              (graph && peakY(graph.p600)) || c.p600?.all?.quantileMinValue || null,
            ];
          }
          return null;
        })
        .catch(() => null);

      cutoffsCache[key] = promise;
      return promise;
    }

    async function scoreToPercentile(score, season, region) {
      const thresholds = await getSeasonCutoffs(region, season);
      if (!thresholds) return null;
      const allPoints = [{ p: 0.1, s: thresholds[0] }, { p: 1, s: thresholds[1] }, { p: 10, s: thresholds[2] }, { p: 25, s: thresholds[3] }, { p: 40, s: thresholds[4] }];
      const dataPoints = allPoints.filter(d => d.s !== null && d.s > 0);
      if (dataPoints.length === 0) return null;
      if (score >= dataPoints[0].s) return dataPoints[0].p;
      if (score <= dataPoints[dataPoints.length - 1].s) return dataPoints[dataPoints.length - 1].p;

      for (let i = 0; i < dataPoints.length - 1; i++) {
        const p1 = dataPoints[i].p, s1 = dataPoints[i].s, p2 = dataPoints[i + 1].p, s2 = dataPoints[i + 1].s;
        if (score <= s1 && score >= s2) return p2 + ((score - s2) / (s1 - s2)) * (p1 - p2);
      }
      return null;
    }

    async function initApiData() {
      try {
        const resStatic = await fetch("https://raider.io/api/v1/mythic-plus/static-data?expansion_id=11");
        if (resStatic.ok) {
          const staticData = await resStatic.json();
          const now = Date.now();
          let targetDungeons = [];

          for (const season of staticData.seasons) {
            const start = new Date(season.starts.us || season.starts.eu).getTime();
            const end = new Date(season.ends.us || season.ends.eu).getTime();
            if (now >= start && now <= end) {
              CURRENT_SEASON = season.slug;
              targetDungeons = season.dungeons;
              DUNGEON_ORDER = season.dungeons.map(d => ({ name: d.name, short: d.short_name, icon_url: d.icon_url || '' }));
              for (const d of season.dungeons) DUNGEON_TIMERS[d.name] = DUNGEON_TIMERS[d.short_name] = d.keystone_timer_seconds;
              break;
            }
          }

          if (!CURRENT_SEASON && staticData.seasons.length > 0) {
            const lastSeason = staticData.seasons[staticData.seasons.length - 1];
            CURRENT_SEASON = lastSeason.slug;
            targetDungeons = lastSeason.dungeons;
            DUNGEON_ORDER = lastSeason.dungeons.map(d => ({ name: d.name, short: d.short_name, icon_url: d.icon_url || '' }));
            for (const d of lastSeason.dungeons) DUNGEON_TIMERS[d.name] = DUNGEON_TIMERS[d.short_name] = d.keystone_timer_seconds;
          }

          if (targetDungeons && targetDungeons.length > 0) {
            const randDungeon = targetDungeons[Math.floor(Math.random() * targetDungeons.length)];
            if (randDungeon.background_image_url) document.getElementById("inspector-placeholder").style.backgroundImage = `url('${randDungeon.background_image_url}')`;
          }

          for (const season of staticData.seasons) {
            if (season.slug === CURRENT_SEASON) break;
            if (!basePastSeasons.includes(season.slug)) basePastSeasons.push(season.slug);
          }
        }
        const pastSeasonsStr = basePastSeasons.join(":");
        FIELDS = `gear,talents,guild,raid_progression,mythic_plus_scores_by_season:${pastSeasonsStr}:${CURRENT_SEASON},mythic_plus_ranks,mythic_plus_recent_runs,mythic_plus_best_runs:all,mythic_plus_alternate_runs:all,mythic_plus_highest_level_runs,mythic_plus_weekly_highest_level_runs,mythic_plus_previous_weekly_highest_level_runs,previous_mythic_plus_ranks`;

      } catch (e) { console.error("Failed to fetch API data", e); }
    }

    function TimeRemainingScoreColor(avgPct, avgKeyLevel) {
      const divisor = Math.pow(2, -avgKeyLevel / 10);
      const adjusted = avgPct / divisor;
      const THRESHOLDS = [
        [1.000, "#FFFF00"], [0.750, "#FFF400"], [0.500, "#FFE800"], [0.470, "#FFE400"], [0.440, "#FFD700"], [0.415, "#F7CB02"], [0.390, "#EFBF04"], [0.370, "#F5C519"],
        [0.350, "#FBD12D"], [0.332, "#FCD43B"], [0.314, "#FCD748"], [0.297, "#FDDE62"], [0.280, "#FDE37C"], [0.264, "#FDE68A"], [0.248, "#FDE897"], [0.233, "#FEF1A4"],
        [0.218, "#FEFAB1"], [0.199, "#FEFCC5"], [0.180, "#FEFED8"], [0.167, "#F3F3E0"], [0.154, "#E8E8E8"], [0.142, "#D6D6D6"], [0.130, "#C4C4C4"], [0.119, "#AEAEAE"],
        [0.108, "#989898"], [0.098, "#927D82"], [0.088, "#927C6D"], [0.079, "#9C7864"], [0.070, "#A57A5A"], [0.062, "#AB7244"], [0.054, "#AA6A2D"], [0.047, "#8F5926"],
        [0.040, "#794C20"], [0.033, "#704214"], [0.026, "#683808"], [0.020, "#57310E"], [0.013, "#492E13"], [0.007, "#3D260F"], [0.000, "#301E0D"]
      ];
      for (const [threshold, color] of THRESHOLDS) if (adjusted >= threshold) return color;
      return "#ffffff";
    }

    function getIlvlColor(diff) {
      const ILVL_THRESHOLDS = [[5.0, "#ffffff"], [4.5, "#f5f5f5"], [4.0, "#ebebeb"], [3.5, "#e1e1e1"], [3.0, "#d7d7d7"], [2.5, "#cdcdcd"], [2.0, "#c3c3c3"], [1.5, "#b9b9b9"], [1.0, "#afafaf"], [0.5, "#a5a5a5"], [0.0, "#9b9b9b"], [-0.5, "#919191"], [-1.0, "#878787"], [-1.5, "#7d7d7d"], [-2.0, "#737373"], [-2.5, "#696969"], [-3.0, "#5f5f5f"], [-3.5, "#555555"], [-4.0, "#4b4b4b"], [-4.5, "#414141"], [-5.0, "#373737"]];
      for (const [threshold, color] of ILVL_THRESHOLDS) if (diff >= threshold) return color;
      return "#301E0D";
    }

    function getKeyLevelColor(lvl) {
      if (!lvl) return '#666';
      const colors = ['#ffb84d', '#ffff00', '#88ff88', '#88ccff', '#ff88ff'];
      return colors[lvl % 5];
    }

    function getRegionClassRankColor(rank) {
      if (rank > 99) return "#666666";
      if (rank > 75) return "#ffffff";
      if (rank > 50) return "#1EFF00";
      if (rank > 25) return "#0070FF";
      if (rank > 10) return "#A335EE";
      if (rank > 3) return "#FF8000";
      if (rank > 1) return "#FF80FF";
      return "#E5CC80";
    }

    function getDungeonTimer(name) {
      if (!name) return null;
      if (DUNGEON_TIMERS[name]) return DUNGEON_TIMERS[name];
      const lower = name.toLowerCase();
      for (const [k, v] of Object.entries(DUNGEON_TIMERS)) if (k.toLowerCase() === lower) return v;
      return null;
    }

    function timeAgo(dateString) {
      if (!dateString) return "-";
      const diffMs = Date.now() - new Date(dateString).getTime();
      if (diffMs < 0) return "s";
      const diffMins = Math.floor(diffMs / 60000);
      if (diffMins < 60) return `${diffMins}m`;
      const diffHrs = Math.floor(diffMs / 3600000);
      if (diffHrs < 24) return `${diffHrs}h`;
      const diffDays = Math.floor(diffMs / 86400000);
      return `${diffDays}d`;
    }

    function updateStatus(msg) {
      document.getElementById("startup-status").textContent = msg;
      document.getElementById("app-status").textContent = msg;
    }

    function updateProgress(val, max) {
      const area1 = document.getElementById("startup-progress-area"), area2 = document.getElementById("app-progress-area");
      const prog1 = document.getElementById("startup-prog"), prog2 = document.getElementById("app-prog");
      const label1 = document.getElementById("startup-prog-label"), label2 = document.getElementById("app-prog-label");

      if (val === null) {
        area1.style.display = "none"; area2.style.display = "none";
      } else {
        area1.style.display = isAppViewActive ? "none" : "flex"; area2.style.display = isAppViewActive ? "flex" : "none";
        prog1.max = prog2.max = max; prog1.value = prog2.value = val;
        label1.textContent = label2.textContent = `${val} / ${max}`;
      }
    }

    function loadFromFile() { document.getElementById("fileInput").click(); }
    function handleFile(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => { try { processInput(JSON.parse(e.target.result)); } catch { updateStatus("Invalid JSON file."); } };
      reader.readAsText(file);
    }
    function loadFromText(fromAppView = false) {
      const txt = document.getElementById(fromAppView ? "app-textInput" : "textInput").value;
      if (!txt || !txt.trim()) return;
      try { processInput(JSON.parse(txt)); } catch { updateStatus("Invalid JSON text."); }
    }

    function parseList(list, region, isGroup) {
      const players = [], stack = [...list];
      while (stack.length) {
        const item = stack.pop();
        if (Array.isArray(item)) { stack.push(...item); continue; }
        if (typeof item === "string") {
          const m = item.match(/^(\d+)-(.+?)-(.+)$/);
          if (m) {
            const roleNum = parseInt(m[1]), name = m[2], realm = m[3];
            const role = roleNum === 1 ? "dps" : [2, 3].includes(roleNum) ? "heal" : [4, 5, 6, 7].includes(roleNum) ? "tank" : "?";
            players.push({ role, name, realm, region, isGroup });
          }
        }
      }
      return players;
    }

    function parseSignups(raw) {
      const region = raw.region || "eu";
      const all = [...parseList(raw.group || [], region, true), ...parseList(raw.queue || [], region, false)];
      const seen = new Set();
      return all.filter(p => {
        const key = `${p.name}-${p.realm}-${p.region}`;
        if (seen.has(key)) return false;
        seen.add(key); return true;
      });
    }

    async function processInput(raw) {
      const ObjectPlayers = parseSignups(raw);
      updateStatus(`Waiting for API metadata...`);
      await apiDataReady;
      updateStatus(`Fetching ${ObjectPlayers.length} players...`);

      if (!isAppViewActive) {
        document.getElementById("startup-container").style.display = "none";
        document.getElementById("app-container").style.display = "flex";
        isAppViewActive = true;
      }
      updateProgress(0, ObjectPlayers.length);

      allPlayersGroup = []; allPlayersQueue = []; rawDataStore = {};
      document.getElementById("table-area-group").innerHTML = "";
      document.getElementById("table-area-queue").innerHTML = "";
      document.getElementById("inspector-placeholder").style.display = "flex";
      document.getElementById("inspector-content").style.display = "none";

      let completed = 0;
      const BATCH = 20;
      for (let i = 0; i < ObjectPlayers.length; i += BATCH) {
        const batch = ObjectPlayers.slice(i, i + BATCH);
        await Promise.all(batch.map(async p => {
          const data = await fetchPlayer(p);
          rawDataStore[`${p.name}-${p.realm}`] = data;
          const analyzed = await analyzePlayer(p, data);
          analyzed.isGroup = p.isGroup;
          if (p.isGroup) allPlayersGroup.push(analyzed); else allPlayersQueue.push(analyzed);
          completed++;
          updateProgress(completed, ObjectPlayers.length);
          appendPlayerRow(analyzed, p.isGroup ? "#table-area-group" : "#table-area-queue", p.isGroup ? "Group Members" : "Queue Signups");
        }));
      }
      updateStatus(`Done. ${ObjectPlayers.length} players loaded.`);
      updateProgress(null);
    }

    async function fetchPlayer(p) {
      try {
        const res = await fetch(`${RIO_API}?region=${p.region}&realm=${encodeURIComponent(p.realm)}&name=${encodeURIComponent(p.name)}&fields=${encodeURIComponent(FIELDS)}`);
        if (!res.ok) return null;
        return await res.json();
      } catch { return null; }
    }

    function calculateCustomIlvl(gear) {
      if (!gear || !gear.items) return { ilvl: 0, missing: [] };
      const items = gear.items;
      let totalWeighted = 0, penalty = 0, bonus = 0, missing = [];
      const TOTAL_GEAR_WEIGHT = GEAR_WEIGHTS.head + GEAR_WEIGHTS.chest + GEAR_WEIGHTS.legs + GEAR_WEIGHTS.shoulder + GEAR_WEIGHTS.hands + GEAR_WEIGHTS.waist + GEAR_WEIGHTS.feet + GEAR_WEIGHTS.wrist + GEAR_WEIGHTS.back + GEAR_WEIGHTS.neck + GEAR_WEIGHTS.finger1 + GEAR_WEIGHTS.finger2 + GEAR_WEIGHTS.trinket1 + GEAR_WEIGHTS.trinket2 + GEAR_WEIGHTS.mainhand + GEAR_WEIGHTS.offhand;

      for (const [slot, item] of Object.entries(items)) {
        if (slot === "tabard" || slot === "shirt") continue;
        let weight = GEAR_WEIGHTS[slot] || 0;
        if (slot === "mainhand" && !items["offhand"]) weight = GEAR_WEIGHTS.twohand;
        totalWeighted += (item.item_level || 0) * weight;
      }
      let baseIlvl = totalWeighted / TOTAL_GEAR_WEIGHT;

      for (const [slot, item] of Object.entries(items)) {
        if (slot === "tabard" || slot === "shirt") continue;
        const gemCount = item.gems ? item.gems.length : 0;
        const isRequired = GEM_CONFIG.requiredSlots.includes(slot);
        if (isRequired) {
          if (gemCount === 0) { penalty += GEM_CONFIG.penaltyMissing; missing.push(`Gem: ${slot}`); }
          else if (gemCount > 1) bonus += (gemCount - 1) * GEM_CONFIG.bonusExtra;
        } else if (gemCount > 0) bonus += gemCount * GEM_CONFIG.bonusExtra;
      }

      for (const reqSlot of GEM_CONFIG.requiredSlots) {
        if (!items[reqSlot]) { penalty += GEM_CONFIG.penaltyMissing; missing.push(`Missing item: ${reqSlot}`); }
      }

      for (const [slot, config] of Object.entries(ENCHANT_CONFIG)) {
        if (slot === "offhand" && !items["offhand"]) continue;
        const item = items[slot];
        if (!item || !item.enchant) {
          penalty += config.penalty;
          if (config.flags) missing.push(`Enchant: ${slot}`);
        }
      }
      return { ilvl: baseIlvl + bonus - penalty, missing };
    }

    function scoreToResil(score) {
      if (!score || score <= 0) return 0;
      return ((score / 8) - 185) / 15;
    }

    async function analyzePlayer(p, data) {
      if (!data) return { name: p.name, realm: p.realm, region: p.region, role: p.role, error: true };

      let heroic = 0, mythic = 0;
      for (const raid of Object.values(data.raid_progression || {})) {
        if (raid.heroic_bosses_killed === raid.total_bosses) heroic++;
        if (raid.mythic_bosses_killed === raid.total_bosses) mythic++;
      }

      const gearCalc = calculateCustomIlvl(data.gear);
      const unweightedIlvl = data.gear?.item_level_equipped || 0;
      const weightedIlvl = gearCalc.ilvl;
      const ilvlDiff = weightedIlvl - unweightedIlvl;

      const ranks = data.mythic_plus_ranks || {};
      const roleRankMap = { dps: ranks.class_dps, heal: ranks.class_healer, tank: ranks.class_tank };
      const specRankRegion = (roleRankMap[p.role] || ranks.class || ranks.overall || {}).region || 0;

      const seasons = data.mythic_plus_scores_by_season || [];
      let currentScore = 0, currentScoreColor = "#ccc";

      for (const s of seasons) {
        if (s.season === CURRENT_SEASON) {
          currentScore = s.scores?.all || 0;
          currentScoreColor = s.segments?.all?.color || "#ffffff";
        }
      }

      const pastSeasonsRaw = seasons.filter(s => s.season !== CURRENT_SEASON && (s.scores?.all || 0) >= 2000).map(s => ({ season: s.season, score: s.scores.all, color: s.segments?.all?.color || "#ffffff" }));
      const roleKey = p.role === "tank" ? "tank" : p.role === "heal" ? "healer" : "dps";
      const pastSeasonsRoleRaw = seasons.filter(s => s.season !== CURRENT_SEASON && (s.scores?.[roleKey] || 0) >= 2000).map(s => ({ season: s.season, score: s.scores[roleKey], color: s.segments?.[roleKey]?.color || "#ffffff" }));

      const pastSeasonsWithPerc = await Promise.all(pastSeasonsRaw.map(async s => ({ ...s, perc: await scoreToPercentile(s.score, s.season, p.region) })));
      const pastSeasonsRoleWithPerc = await Promise.all(pastSeasonsRoleRaw.map(async s => ({ ...s, perc: await scoreToPercentile(s.score, s.season, p.region) })));

      const sortByPerc = arr => [...arr].sort((a, b) => {
        if (a.perc !== null && b.perc !== null) return a.perc - b.perc;
        if (a.perc !== null) return -1;
        if (b.perc !== null) return 1;
        return b.score - a.score;
      });

      const sortedAny = sortByPerc(pastSeasonsWithPerc);
      const sortedRole = sortByPerc(pastSeasonsRoleWithPerc);
      const bestRoleSeason = sortedRole[0] || null, bestAnySeason = sortedAny[0] || null;

      let slot1 = null, slot2 = null;
      if (bestRoleSeason && bestAnySeason) {
        slot1 = bestRoleSeason;
        slot2 = (bestRoleSeason.season === bestAnySeason.season) ? (sortedAny[1] || null) : bestAnySeason;
      } else if (bestAnySeason) {
        slot1 = bestAnySeason;
        slot2 = sortedAny[1] || null;
      }

      function fmtSlot(s) {
        if (!s) return null;
        const seasonLabel = s.season.replace('season-', '');
        return s.perc != null ? `<span style="color:${s.color}" title="${seasonLabel}">${s.perc.toFixed(1)}%</span>` : `<span style="color:${s.color}" title="${seasonLabel}">${fmtScore(s.score)}</span>`;
      }
      const parts = [fmtSlot(slot1), fmtSlot(slot2)].filter(Boolean);
      const topSeasonsStr = parts.length === 1 ? parts[0] : parts.length > 1 ? `${parts[0]} (${parts[1]})` : "-";

      const bestPastPercentile = slot1?.perc ?? (slot1?.score ? 99 : 99);
      const ksmCount = seasons.filter(s => (s.scores?.all || 0) >= 2000).length;

      const highestRuns = data.mythic_plus_highest_level_runs || [];
      const bestRuns = data.mythic_plus_best_runs || [];
      const altRuns = data.mythic_plus_alternate_runs || [];
      const recentRuns = data.mythic_plus_recent_runs || [];
      const weeklyRuns = data.mythic_plus_weekly_highest_level_runs || [];
      const prevWeeklyRuns = data.mythic_plus_previous_weekly_highest_level_runs || [];

      const highestUrls = new Set(highestRuns.map(r => r.url).filter(Boolean));
      const allRawRuns = [...highestRuns, ...bestRuns, ...altRuns, ...recentRuns, ...weeklyRuns, ...prevWeeklyRuns];
      const uniqueRunsMap = new Map();
      for (const r of allRawRuns) uniqueRunsMap.set(r.url || `${r.short_name}-${r.mythic_level}-${r.clear_time_ms}-${r.completed_at}`, r);
      const combinedRuns = Array.from(uniqueRunsMap.values()).sort((a, b) => (b.mythic_level !== a.mythic_level) ? b.mythic_level - a.mythic_level : new Date(b.completed_at).getTime() - new Date(a.completed_at).getTime());
      combinedRuns.forEach(r => r.isHighest = r.url ? highestUrls.has(r.url) : false);

      let recencyStr = "-", timeRemainingStr = "-", timeRemainingColor = "#dddddd", roleMismatch = false, actualMainRole = p.role;

      if (bestRuns.length > 0) {
        for (const r of bestRuns) {
          let runRole = r.role ? r.role.toLowerCase() : (r.roster?.find(m => m.character?.name?.toLowerCase() === p.name.toLowerCase())?.role?.toLowerCase() || "");
          if (runRole) {
            runRole = (runRole === "healing" || runRole === "healer") ? "heal" : (runRole === "tanking") ? "tank" : runRole;
            if (p.role !== "?" && runRole !== p.role) { roleMismatch = true; actualMainRole = runRole; break; }
          }
        }
        const daysAgoArr = bestRuns.filter(r => r.completed_at).map(r => (Date.now() - new Date(r.completed_at).getTime()) / 86400000).sort((a, b) => a - b);
        if (daysAgoArr.length > 0) {
          const recents = daysAgoArr.slice(0, 4), olds = daysAgoArr.slice(-4);
          recencyStr = `${Math.round(recents.reduce((a, b) => a + b, 0) / recents.length)}-${Math.round(olds.reduce((a, b) => a + b, 0) / olds.length)}d`;
        }

        let totRemSec = 0, totPctRem = 0, cnt = 0, totLvl = 0;
        for (const r of bestRuns) {
          const parSecs = r.par_time_ms ? r.par_time_ms / 1000 : getDungeonTimer(r.dungeon?.name || r.short_name);
          const clearSecs = r.clear_time_ms ? r.clear_time_ms / 1000 : null;
          if (parSecs !== null && clearSecs !== null) {
            totRemSec += (parSecs - clearSecs); totPctRem += (parSecs - clearSecs) / parSecs; totLvl += (r.mythic_level || 0); cnt++;
          }
        }
        if (cnt > 0) {
          const absSecs = Math.abs(totRemSec / cnt);
          timeRemainingStr = `${totRemSec / cnt < 0 ? "-" : ""}${Math.floor(absSecs / 60)}m ${Math.floor(absSecs % 60).toString().padStart(2, '0')}s`;
          timeRemainingColor = TimeRemainingScoreColor(totPctRem / cnt, totLvl / cnt);
        }
      }

      // Sort dungeons chronologically based on best run dates
      const sortedDungeons = DUNGEON_ORDER.map(d => {
        const run = bestRuns.find(r => (r.dungeon?.short_name || r.short_name) === d.short);
        return {
          short: d.short, name: d.name, icon_url: d.icon_url,
          level: run ? (run.mythic_level || 0) : 0,
          completed_at: run?.completed_at ? new Date(run.completed_at).getTime() : 0,
          clear_time_ms: run?.clear_time_ms || 0, par_time_ms: run?.par_time_ms || 0
        };
      }).sort((a, b) => b.completed_at - a.completed_at);

      return {
        name: p.name, realm: p.realm, region: p.region, role: p.role,
        playerClass: data.class || "-", race: data.race || "Unknown", specName: data.active_spec_name || "",
        ilvl: unweightedIlvl, weightedIlvl, ilvlDiff, missingUpgrades: gearCalc.missing,
        mythic, heroic, ksmCount, currentScore, currentScoreColor, specRankRegion,
        topSeasonsStr, bestPastPercentile, recencyStr, timeRemainingStr, timeRemainingColor,
        guild: data.guild?.name || "-", roleMismatch, actualMainRole, combinedRuns, sortedDungeons, error: false
      };
    }

    function getTableHeaders() {
      return [
        { key: "name", label: "Player" }, { key: "role", label: "Role" }, { key: "playerClass", label: "Class" },
        { key: "bestPastPercentile", label: "Top Seasons" }, { key: "_ceSort", label: "CE/AOTC/KSM" },
        { key: "timeRemainingStr", label: "Time Remaining" }, { key: "recencyStr", label: "Recency" },
        { key: "currentScore", label: "Score" }, { key: "_dungeons", label: "Dungeons" }
      ];
    }

    function buildRowHtml(p) {
      const key = `${p.name}-${p.realm}`;
      if (p.error) return `<tr data-key="${key}" onclick="openInspector('${key}')"><td>${key}</td><td colspan="8" style="color:#f66">Fetch error</td></tr>`;

      const roleClass = r => r === "dps" ? "role-dps" : r === "heal" ? "role-heal" : r === "tank" ? "role-tank" : "";
      const roleWarning = p.roleMismatch ? `<span class="${roleClass(p.actualMainRole)}" style="font-weight:bold; cursor:help" title="Queued as ${p.role}, plays ${p.actualMainRole}">*</span>` : '';

      const rankDisplay = (p.specRankRegion > 0 && p.specRankRegion <= 99) ? `<span style="color:${getRegionClassRankColor(p.specRankRegion)}">#${p.specRankRegion}</span>` : "–";
      const scoreStr = p.currentScore > 0 ? `<span style="color:${p.currentScoreColor}">${Math.round(p.currentScore)}</span> <span style="color:#888; font-size:14px;" title="${p.specRankRegion > 0 ? `Region: #${p.specRankRegion}` : 'No rank data'}">${rankDisplay}</span>` : `<span style="color:#f90">0?</span> <span style="color:#888; font-size:14px;">(–)</span>`;

      let dungeonIcons = "";
      if (p.sortedDungeons && p.sortedDungeons.length > 0) {
        const maxLevel = Math.max(...p.sortedDungeons.map(d => d.level), 0);
        dungeonIcons = p.sortedDungeons.map(d => {
          const lvl = d.level, label = lvl ? `+${lvl}` : `–`;
          const color = lvl ? (maxLevel - lvl >= 5 ? '#ffffff' : getKeyLevelColor(lvl)) : '#666';
          const timeAgoStr = (lvl && d.completed_at) ? ` (${timeAgo(d.completed_at)} ago)` : '';
          return `<div style="position:relative;display:inline-block;margin:0 3px;vertical-align:middle" title="${d.name}: ${label}${timeAgoStr}">
            <img src="${d.icon_url || ''}" width="32" height="32" style="display:block;border:1px solid #444;border-radius:4px">
            <span style="position:absolute;bottom:0;left:0;right:0;text-align:center;font-size:18px;font-weight:bold;color:${color};background:rgba(0,0,0,0.7);line-height:20px;border-radius:0 0 4px 4px; letter-spacing:-1px;">${label}</span>
          </div>`;
        }).join('');
      }

      const progressDisplay = `<span style="color:${p.mythic >= 1 ? "#ff8000" : "#666"}">${p.mythic}</span> / <span style="color:${p.heroic >= 1 ? "#a335ee" : "#666"}">${p.heroic}</span> / <span style="color:${p.ksmCount >= 1 ? "#0070dd" : "#666"}">${p.ksmCount}</span>`;
      const classDisplay = `<span style="color:${CLASS_COLORS[p.playerClass] || "#ccc"}">${CLASS_SHORT[p.playerClass] || p.playerClass}</span> <span style="color:#aaa">(${p.ilvl > 0 ? `<span style="color:${getIlvlColor(p.ilvlDiff)}" title="Weighted: ${Math.round(p.weightedIlvl)}. Diff: ${p.ilvlDiff >= 0 ? '+' : ''}${p.ilvlDiff.toFixed(1)}">${Math.round(p.weightedIlvl)}</span>` : ""} ${SPEC_SHORT[p.specName] || p.specName})</span>${p.missingUpgrades?.length ? ` <span style="color:#ff7070; font-weight:bold; cursor:help" title="${p.missingUpgrades.join(', ')}">(!)</span>` : ''}`;

      const nameTrunc = (p.name + "-" + p.realm).length > (p.guild && p.guild !== "-" ? 24 : 21) ? (p.name + "-" + p.realm).substring(0, (p.guild && p.guild !== "-" ? 24 : 21) - 1) + '…' : p.name + "-" + p.realm;
      const idx = nameTrunc.indexOf('-');
      const nameDisplay = `<span title="${p.name}-${p.realm} | ${p.guild && p.guild !== "-" ? 'Guild: ' + p.guild : 'No guild'}" style="white-space:nowrap">${idx > -1 ? nameTrunc.substring(0, idx) : nameTrunc}<span style="color:#666">${idx > -1 ? nameTrunc.substring(idx) : ""}</span>${p.guild && p.guild !== "-" ? "" : " &lt;&gt;"}</span>`;

      return `<tr data-key="${key}" style="vertical-align:top;" onclick="openInspector('${key}')">
        <td>${nameDisplay}</td>
        <td class="${roleClass(p.role)}">${p.role}${roleWarning}</td>
        <td>${classDisplay}</td>
        <td>${p.topSeasonsStr}</td>
        <td>${progressDisplay}</td>
        <td>${p.timeRemainingStr !== "-" ? `<span style="color:${p.timeRemainingColor}">${p.timeRemainingStr}</span> <span style="color:${p.currentScoreColor || "#ccc"}">(+${scoreToResil(p.currentScore).toFixed(1)})</span>` : "-"}</td>
        <td>${p.recencyStr}</td>
        <td>${scoreStr}</td>
        <td style="white-space:normal; overflow:visible;"><div style="display:flex;align-items:center;gap:6px;flex-wrap:nowrap;overflow:hidden">${dungeonIcons}</div></td>
      </tr>`;
    }

    function appendPlayerRow(p, containerId, title) {
      let container = document.querySelector(containerId), table = container.querySelector("table");
      if (!table) {
        let html = `<h4 style="margin:0 0 12px 0; color:#aaa; font-size:20px;">${title}</h4><table class="peeking-table"><thead><tr>`;
        for (const c of getTableHeaders()) html += `<th onclick="setSort('${c.key}')">${c.label}</th>`;
        html += "</tr></thead><tbody></tbody></table>";
        container.innerHTML = html;
        table = container.querySelector("table");
      }
      table.querySelector("tbody").insertAdjacentHTML("beforeend", buildRowHtml(p));
    }

    function renderTable() {
      renderSpecificTable(allPlayersGroup, "#table-area-group", "Group Members");
      renderSpecificTable(allPlayersQueue, "#table-area-queue", "Queue Signups");
    }

    function renderSpecificTable(players, containerId, title) {
      let container = document.querySelector(containerId);
      if (!players || players.length === 0) { container.innerHTML = ""; return; }

      let sorted = [...players];
      if (sortCol) {
        sorted.sort((a, b) => {
          if (sortCol === "_ceSort") {
            const va = (a.mythic ?? 0) * 10000 + (a.heroic ?? 0) * 100 + (a.ksmCount ?? 0);
            const vb = (b.mythic ?? 0) * 10000 + (b.heroic ?? 0) * 100 + (b.ksmCount ?? 0);
            return sortAsc ? va - vb : vb - va;
          }
          if (sortCol === "_dungeons") {
            const aLevels = a.sortedDungeons.map(d => d.level).sort((x, y) => y - x);
            const bLevels = b.sortedDungeons.map(d => d.level).sort((x, y) => y - x);
            for (let i = 0; i < Math.max(aLevels.length, bLevels.length); i++) {
              const al = aLevels[i] || 0, bl = bLevels[i] || 0;
              if (al !== bl) return sortAsc ? al - bl : bl - al;
            }
            const aTime = a.sortedDungeons.reduce((acc, d) => acc + (d.par_time_ms && d.clear_time_ms ? d.par_time_ms - d.clear_time_ms : 0), 0);
            const bTime = b.sortedDungeons.reduce((acc, d) => acc + (d.par_time_ms && d.clear_time_ms ? d.par_time_ms - d.clear_time_ms : 0), 0);
            return sortAsc ? aTime - bTime : bTime - aTime;
          }
          let va = a[sortCol] ?? "", vb = b[sortCol] ?? "";
          if (typeof va === "number" && typeof vb === "number") return sortAsc ? va - vb : vb - va;
          return sortAsc ? String(va).localeCompare(String(vb)) : String(vb).localeCompare(String(va));
        });
      }

      let html = `<h4 style="margin:0 0 12px 0; color:#aaa; font-size:20px;">${title}</h4><table class="peeking-table"><thead><tr>`;
      for (const c of getTableHeaders()) {
        const arrow = sortCol === c.key ? (sortAsc ? " ▲" : " ▼") : "";
        html += `<th onclick="setSort('${c.key}')">${c.label}${arrow}</th>`;
      }
      html += "</tr></thead><tbody>" + sorted.map(buildRowHtml).join("") + "</tbody></table>";
      container.innerHTML = html;
    }

    function fmtScore(s) { return s >= 1000 ? `${(s / 1000).toFixed(1)}k` : `${s}`; }
    function setSort(col) {
      if (sortCol === col) sortAsc = !sortAsc;
      else { sortCol = col; sortAsc = (col === "bestPastPercentile"); }
      renderTable();
    }

    // ── Side Panel Inspector (Simplified) ────────────────────────────────────────────────────────
    function openInspector(key) {
      const data = rawDataStore[key];
      if (!data) return;

      document.querySelectorAll('tr').forEach(tr => tr.classList.remove('selected-row'));
      const row = document.querySelector(`tr[data-key="${key}"]`);
      if (row) row.classList.add('selected-row');

      document.getElementById("inspector-placeholder").style.display = "none";
      document.getElementById("inspector-content").style.display = "block";
      document.getElementById("inspector-title").textContent = key.replace('-', ' - ');

      document.getElementById("inspector-body").innerHTML = renderAllRunsTab(data);
    }

    function renderAllRunsTab(data) {
      const allRawRuns = [
        ...(data.mythic_plus_highest_level_runs || []), ...(data.mythic_plus_best_runs || []),
        ...(data.mythic_plus_alternate_runs || []), ...(data.mythic_plus_recent_runs || []),
        ...(data.mythic_plus_weekly_highest_level_runs || []), ...(data.mythic_plus_previous_weekly_highest_level_runs || [])
      ];

      const highestUrls = new Set((data.mythic_plus_highest_level_runs || []).map(r => r.url).filter(Boolean));
      const uniqueRunsMap = new Map();
      for (const r of allRawRuns) uniqueRunsMap.set(r.url || `${r.short_name}-${r.mythic_level}-${r.clear_time_ms}-${r.completed_at}`, r);

      const combinedRuns = Array.from(uniqueRunsMap.values()).sort((a, b) => {
        if (b.mythic_level !== a.mythic_level) return b.mythic_level - a.mythic_level;
        return new Date(b.completed_at).getTime() - new Date(a.completed_at).getTime();
      });

      if (!combinedRuns.length) return `<em>No run data available.</em>`;
      const maxRunLevel = Math.max(...combinedRuns.map(r => r.mythic_level || 0), 0);

      let html = `<table class="run-table"><thead><tr>
        <th>Dungeon</th><th style="text-align:center;">Best</th><th>Time</th><th>Day</th>
      </tr></thead><tbody>`;

      for (const r of combinedRuns) {
        const isHighest = r.url ? highestUrls.has(r.url) : false;
        const diffMs = r.clear_time_ms - r.par_time_ms;
        const isTimed = diffMs <= 0, absDiffSec = Math.floor(Math.abs(diffMs) / 1000);
        const diffHtml = `<span style="color:${isTimed ? "#70ff70" : "#ff7070"}; font-weight:bold;">${isTimed ? "-" : "+"}${Math.floor(absDiffSec / 60)}:${(absDiffSec % 60).toString().padStart(2, '0')}</span>`;

        const shortName = r.dungeon?.short_name || r.short_name || "-";
        const lvl = r.mythic_level, label = `+${lvl}`;
        const labelColor = (maxRunLevel - lvl >= 5) ? '#ffffff' : getKeyLevelColor(lvl);
        let iconUrl = r.dungeon?.icon_url || DUNGEON_ORDER.find(d => d.short === shortName)?.icon_url || "";

        const iconHtml = iconUrl ? `<div style="position:relative;display:inline-block;margin:0 3px;vertical-align:middle" title="${label}">
          <img src="${iconUrl}" width="32" height="32" style="display:block;border:1px solid #444;border-radius:4px">
          <span style="position:absolute;bottom:0;left:0;right:0;text-align:center;font-size:15px;font-weight:bold;color:${labelColor};background:rgba(0,0,0,0.7);line-height:18px;border-radius:0 0 4px 4px; letter-spacing:-1px;">${label}</span>
        </div>` : `<span style="color:${labelColor}; font-weight:bold;">${label}</span>`;

        html += `<tr>
          <td><div style="display:flex;align-items:center;gap:8px;">${iconHtml}<span style="font-size:15px;">${shortName}</span></div></td>
          <td style="text-align:center;">${isHighest ? `<span style="color:#70ff70; font-weight:bold;">✓</span>` : `<span style="color:#666">✗</span>`}</td>
          <td>${diffHtml}</td>
          <td>${timeAgo(r.completed_at)}</td>
        </tr>`;
      }
      return html + "</tbody></table>";
