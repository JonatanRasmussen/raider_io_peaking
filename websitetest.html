<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <style>
    /*
       --- NATIVE SCALING APPLIED (~150%) ---
       Base fonts and paddings have been increased.
    */
    body {
      font-family: monospace;
      background: #121212;
      color: #ccc;
      margin: 0;
      padding: 0;
      font-size: 16px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Custom Scrollbars */
    ::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    ::-webkit-scrollbar-track {
      background: #1a1a1a;
    }

    ::-webkit-scrollbar-thumb {
      background: #444;
      border-radius: 5px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #666;
    }

    /* Layout Containers */
    #startup-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.3s ease;
    }

    #app-container {
      display: none;
      flex: 1;
      flex-direction: row;
      overflow: hidden;
    }

    #left-pane {
      flex: 1;
      overflow-y: auto;
      padding: 25px;
      background: #1a1a1a;
    }

    #right-pane {
      width: 350px;
      min-width: 350px;
      background: #161616;
      border-left: 1px solid #333;
      overflow-y: auto;
      padding: 0;
      /* Changed to 0 so the placeholder can be edge-to-edge */
      box-shadow: -5px 0 20px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
    }

    /* Controls */
    .controls-wrapper {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      background: #222;
      padding: 20px;
      border: 1px solid #444;
      border-radius: 8px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    }

    .compact-controls {
      background: transparent;
      padding: 0;
      border: none;
      box-shadow: none;
    }

    .peeking-table th:nth-child(1) { min-width: 200px; } /* Player */
    .peeking-table th:nth-child(2) { min-width: 45px; }  /* Role */
    .peeking-table th:nth-child(3) { min-width: 195px; } /* Class / iLvl */
    .peeking-table th:nth-child(4) { min-width: 110px; } /* Top Seasons */
    .peeking-table th:nth-child(5) { min-width: 80px; }  /* CE/AOTC/KSM */
    .peeking-table th:nth-child(6) { min-width: 100px; } /* Time Remaining */
    .peeking-table th:nth-child(7) { min-width: 60px; }  /* Recency */
    .peeking-table th:nth-child(8) { min-width: 65px; }  /* Score */
    .peeking-table th:nth-child(9) { min-width: 350px; } /* Dungeons */



    table {
      border-collapse: collapse;
      width: 100%;
      font-size: 15px;
    }

    th,
    td {
      border: 1px solid #333;
      padding: 6px 10px;
      text-align: left;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    th {
      background: #252525;
      color: #fff;
      cursor: pointer;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
    }

    tr {
      cursor: pointer;
      transition: background 0.1s;
    }

    tr:hover {

    tr.selected-row {

    progress {

      height: 20px;
      accent-color: #4a75a3;
    }

      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      width: 100%;
      color: #eee;
      text-align: center;
      font-size: 18px;

      background-position: center;

      border: 1px solid #333;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);

      font-size: 15px;
      color: #ddd;

      background: #2a2a2a;
      border: 1px solid #444;
      color: #aaa;
      padding: 6px 15px;

      margin-right: 4px;
      margin-bottom: 6px;

    .score-val {

    .run-table,

    .ranks-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
      margin-top: 12px;
    }

</head>

    // ── DYNAMIC API DATA CACHES ─────────────────────────────────────────────────
    let CURRENT_SEASON = "";
    let DUNGEON_TIMERS = {};
    let DUNGEON_ORDER = [];
    let FIELDS = "";
    const cutoffsCache = {};

    let basePastSeasons = [
      "season-sl-3", "season-sl-4",
      "season-df-1", "season-df-2", "season-df-3", "season-df-4",
      "season-tww-1", "season-tww-2", "season-tww-3"
    ];

    function getSeasonCutoffs(region, season) {
      const key = `${region.toLowerCase()}-${season}`;
      if (cutoffsCache[key]) return cutoffsCache[key];

      const promise = fetch(`https://raider.io/api/v1/mythic-plus/season-cutoffs?season=${season}&region=${region}`)
        .then(res => res.ok ? res.json() : null)
        .then(data => {
          if (data && data.cutoffs) {
            const c = data.cutoffs;
            const graph = c.graphData;

            function peakY(series) {
              if (series && series.data && series.data.length > 0) {
                return Math.max(...series.data.map(d => d.y));
              }
              return null;
            }

            return [
              (graph && peakY(graph.p999)) || c.p999?.all?.quantileMinValue || null,
              (graph && peakY(graph.p990)) || c.p990?.all?.quantileMinValue || null,
              (graph && peakY(graph.p900)) || c.p900?.all?.quantileMinValue || null,
              (graph && peakY(graph.p750)) || c.p750?.all?.quantileMinValue || null,
              (graph && peakY(graph.p600)) || c.p600?.all?.quantileMinValue || null,
            ];
          }
          return null;
        })
        .catch(() => null);

      cutoffsCache[key] = promise;
      return promise;
    }

    async function scoreToPercentile(score, season, region) {
      const thresholds = await getSeasonCutoffs(region, season);
      if (!thresholds) return null;

      const allPoints = [
        { p: 0.1, s: thresholds[0] },
        { p: 1, s: thresholds[1] },
        { p: 10, s: thresholds[2] },
        { p: 25, s: thresholds[3] },
        { p: 40, s: thresholds[4] }
      ];

      const dataPoints = allPoints.filter(d => d.s !== null && d.s > 0);
      if (dataPoints.length === 0) return null;

      if (score >= dataPoints[0].s) return dataPoints[0].p;
      if (score <= dataPoints[dataPoints.length - 1].s) return dataPoints[dataPoints.length - 1].p;

      for (let i = 0; i < dataPoints.length - 1; i++) {
        const p1 = dataPoints[i].p, s1 = dataPoints[i].s;
        const p2 = dataPoints[i + 1].p, s2 = dataPoints[i + 1].s;
        if (score <= s1 && score >= s2) {
          const frac = (score - s2) / (s1 - s2);
          return p2 + frac * (p1 - p2);
        }
      }
      return null;
    }

    async function initApiData() {
      try {
        const resStatic = await fetch("https://raider.io/api/v1/mythic-plus/static-data?expansion_id=11");
        if (resStatic.ok) {
          const staticData = await resStatic.json();
          const now = Date.now();
          let targetDungeons = [];

          for (const season of staticData.seasons) {
            const start = new Date(season.starts.us || season.starts.eu).getTime();
            const end = new Date(season.ends.us || season.ends.eu).getTime();

            if (now >= start && now <= end) {
              CURRENT_SEASON = season.slug;
              targetDungeons = season.dungeons;
              DUNGEON_ORDER = season.dungeons.map(d => ({ name: d.name, short: d.short_name, icon_url: d.icon_url || '' }));
              for (const d of season.dungeons) {
                DUNGEON_TIMERS[d.name] = d.keystone_timer_seconds;
                DUNGEON_TIMERS[d.short_name] = d.keystone_timer_seconds;
              }
              break;
            }
          }

          if (!CURRENT_SEASON && staticData.seasons.length > 0) {
            const lastSeason = staticData.seasons[staticData.seasons.length - 1];
            CURRENT_SEASON = lastSeason.slug;
            targetDungeons = lastSeason.dungeons;
            DUNGEON_ORDER = lastSeason.dungeons.map(d => ({ name: d.name, short: d.short_name, icon_url: d.icon_url || '' }));
            for (const d of lastSeason.dungeons) {
              DUNGEON_TIMERS[d.name] = d.keystone_timer_seconds;
              DUNGEON_TIMERS[d.short_name] = d.keystone_timer_seconds;
            }
          }

          // Apply Random Background Image to the Inspector Placeholder
          if (targetDungeons && targetDungeons.length > 0) {
            const randDungeon = targetDungeons[Math.floor(Math.random() * targetDungeons.length)];
            if (randDungeon.background_image_url) {
              document.getElementById("inspector-placeholder").style.backgroundImage = `url('${randDungeon.background_image_url}')`;
            }
          }

          for (const season of staticData.seasons) {
            if (season.slug === CURRENT_SEASON) break;
            if (!basePastSeasons.includes(season.slug)) {
              basePastSeasons.push(season.slug);
            }
          }
        }

        const pastSeasonsStr = basePastSeasons.join(":");
        FIELDS = `gear,talents,guild,raid_progression,mythic_plus_scores_by_season:${pastSeasonsStr}:${CURRENT_SEASON},mythic_plus_ranks,mythic_plus_recent_runs,mythic_plus_best_runs:all,mythic_plus_alternate_runs:all,mythic_plus_highest_level_runs,mythic_plus_weekly_highest_level_runs,mythic_plus_previous_weekly_highest_level_runs,previous_mythic_plus_ranks`;

      } catch (e) { console.error("Failed to fetch API data", e); }
    }

        [0.350, "#FBD12D"], [0.332, "#FCD43B"], [0.314, "#FCD748"], [0.297, "#FDDE62"], [0.280, "#FDE37C"], [0.264, "#FDE68A"], [0.248, "#FDE897"], [0.233, "#FEF1A4"],

      ];

      for (const [threshold, color] of THRESHOLDS) {
        if (adjusted >= threshold) return color;
      }
      return "#ffffff";
    }

        [-4.5, "#414141"], [-4.6, "#3f3f3f"], [-4.7, "#3d3d3d"], [-4.8, "#3b3b3b"], [-4.9, "#393939"],
        [-5.0, "#373737"],
      ];
      for (const [threshold, color] of ILVL_THRESHOLDS) {
        if (diff >= threshold) return color;
      }
      return "#301E0D";
    }

    function getKeyLevelColor(lvl) {
      if (!lvl) return '#666';
      const colors = [
        '#ffb84d', // 0 (e.g. +5, +10) - Orange
        '#ffff00', // 1 (e.g. +1, +6)  - Yellow
        '#88ff88', // 2 (e.g. +2, +7)  - Green
        '#88ccff', // 3 (e.g. +3, +8)  - Blue
        '#ff88ff'  // 4 (e.g. +4, +9)  - Pink
      ];
      return colors[lvl % 5];
    }

    function getRegionClassRankColor(rank) {
      if (rank > 99) return "#666666";   // grey
      if (rank > 75) return "#ffffff";   // white
      if (rank > 50) return "#1EFF00";   // green
      if (rank > 25) return "#0070FF";   // blue
      if (rank > 10) return "#A335EE";   // purple
      if (rank > 3) return "#FF8000";    // orange
      if (rank > 1) return "#FF80FF";    // pink
      return "#E5CC80";                  // gold
    }

    function getDungeonTimer(name) {
      if (!name) return null;
      if (DUNGEON_TIMERS[name]) return DUNGEON_TIMERS[name];
      const lower = name.toLowerCase();
      for (const [k, v] of Object.entries(DUNGEON_TIMERS)) {
        if (k.toLowerCase() === lower) return v;
      }
      return null;
    }

    function timeAgo(dateString) {
      if (!dateString) return "-";
      const d = new Date(dateString).getTime();
      const now = Date.now();
      const diffMs = now - d;
      if (diffMs < 0) return "s";
      const diffMins = Math.floor(diffMs / 60000);
      if (diffMins < 60) return `${diffMins}m`;
      const diffHrs = Math.floor(diffMs / 3600000);
      if (diffHrs < 24) return `${diffHrs}h`;
      const diffDays = Math.floor(diffMs / 86400000);
      return `${diffDays}d`;
    }

    function updateStatus(msg) {
      document.getElementById("startup-status").textContent = msg;
      document.getElementById("app-status").textContent = msg;
    }

    function updateProgress(val, max) {
      const area1 = document.getElementById("startup-progress-area");
      const area2 = document.getElementById("app-progress-area");
      const prog1 = document.getElementById("startup-prog");
      const prog2 = document.getElementById("app-prog");
      const label1 = document.getElementById("startup-prog-label");
      const label2 = document.getElementById("app-prog-label");

      if (val === null) {
        area1.style.display = "none";
        area2.style.display = "none";
      } else {
        area1.style.display = isAppViewActive ? "none" : "flex";
        area2.style.display = isAppViewActive ? "flex" : "none";
        prog1.max = max; prog1.value = val;
        prog2.max = max; prog2.value = val;
        label1.textContent = `${val} / ${max}`;
        label2.textContent = `${val} / ${max}`;
      }
    }

    function loadFromFile() { document.getElementById("fileInput").click(); }

    function handleFile(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        try {
          const json = JSON.parse(e.target.result);
          processInput(json);
        } catch {
          updateStatus("Invalid JSON file.");
        }
      };
      reader.readAsText(file);
    }

    function loadFromText(fromAppView = false) {
      const inputId = fromAppView ? "app-textInput" : "textInput";
      const txt = document.getElementById(inputId).value;
      if (!txt || !txt.trim()) return;
      try {
        const json = JSON.parse(txt);
        processInput(json);
      } catch {
        updateStatus("Invalid JSON text.");
      }
    }

    function parseList(list, region, isGroup) {
      const players = [];
      const stack = [...list];
      while (stack.length) {
        const item = stack.pop();
        if (Array.isArray(item)) { stack.push(...item); continue; }
        if (typeof item === "string") {
          const m = item.match(/^(\d+)-(.+?)-(.+)$/);
          if (m) {
            const roleNum = parseInt(m[1]);
            const name = m[2], realm = m[3];
            const role = roleNum === 1 ? "dps" : [2, 3].includes(roleNum) ? "heal" : [4, 5, 6, 7].includes(roleNum) ? "tank" : "?";
            players.push({ role, name, realm, region, isGroup });
          }
        }
      }
      return players;
    }

    function parseSignups(raw) {
      const region = raw.region || "eu";
      const gPlayers = parseList(raw.group || [], region, true);
      const qPlayers = parseList(raw.queue || [], region, false);

      const all = [...gPlayers, ...qPlayers];
      const seen = new Set();

      return all.filter(p => {
        const key = `${p.name}-${p.realm}-${p.region}`;
        if (seen.has(key)) return false;
        seen.add(key); return true;
      });
    }

    async function processInput(raw) {
      const ObjectPlayers = parseSignups(raw);

      updateStatus(`Waiting for API metadata...`);
      await apiDataReady;

      updateStatus(`Fetching ${ObjectPlayers.length} players...`);
      updateProgress(0, ObjectPlayers.length);

      // Transition UI to App View if not already
      if (!isAppViewActive) {
        document.getElementById("startup-container").style.display = "none";
        document.getElementById("app-container").style.display = "flex";
        isAppViewActive = true;
        updateProgress(0, ObjectPlayers.length); // re-trigger display logic
      }

      allPlayersGroup = [];
      allPlayersQueue = [];
      rawDataStore = {};
      document.getElementById("table-area-group").innerHTML = "";
      document.getElementById("table-area-queue").innerHTML = "";

      // Reset inspector
      document.getElementById("inspector-placeholder").style.display = "flex";
      document.getElementById("inspector-content").style.display = "none";

      let completed = 0;
      const BATCH = 20;
      for (let i = 0; i < ObjectPlayers.length; i += BATCH) {
        const batch = ObjectPlayers.slice(i, i + BATCH);
        await Promise.all(batch.map(async p => {
          const data = await fetchPlayer(p);
          const key = `${p.name}-${p.realm}`;
          rawDataStore[key] = data;

          const analyzed = await analyzePlayer(p, data);
          analyzed.isGroup = p.isGroup;

          if (p.isGroup) allPlayersGroup.push(analyzed);
          else allPlayersQueue.push(analyzed);

          completed++;
          updateProgress(completed, ObjectPlayers.length);
          appendPlayerRow(analyzed, p.isGroup ? "#table-area-group" : "#table-area-queue", p.isGroup ? "Group Members" : "Queue Signups");
        }));
      }

      updateStatus(`Done. ${ObjectPlayers.length} players loaded.`);
      updateProgress(null);
    }

    async function fetchPlayer(p) {
      const url = `${RIO_API}?region=${p.region}&realm=${encodeURIComponent(p.realm)}&name=${encodeURIComponent(p.name)}&fields=${encodeURIComponent(FIELDS)}`;
      try {
        const res = await fetch(url);
        if (!res.ok) return null;
        return await res.json();
      } catch { return null; }
    }

    function calculateCustomIlvl(gear) {
      if (!gear || !gear.items) return { ilvl: 0, missing: [] };

      const items = gear.items;
      let totalWeighted = 0;
      let missing = [];
      let penalty = 0;
      let bonus = 0;

      const TOTAL_GEAR_WEIGHT = GEAR_WEIGHTS.head + GEAR_WEIGHTS.chest + GEAR_WEIGHTS.legs +
        GEAR_WEIGHTS.shoulder + GEAR_WEIGHTS.hands + GEAR_WEIGHTS.waist + GEAR_WEIGHTS.feet +
        GEAR_WEIGHTS.wrist + GEAR_WEIGHTS.back +
        GEAR_WEIGHTS.neck + GEAR_WEIGHTS.finger1 + GEAR_WEIGHTS.finger2 +
        GEAR_WEIGHTS.trinket1 + GEAR_WEIGHTS.trinket2 +
        GEAR_WEIGHTS.mainhand + GEAR_WEIGHTS.offhand;

      for (const [slot, item] of Object.entries(items)) {
        if (slot === "tabard" || slot === "shirt") continue;
        let weight = GEAR_WEIGHTS[slot] || 0;
        if (slot === "mainhand" && !items["offhand"]) {
          weight = GEAR_WEIGHTS.twohand;
        }
        totalWeighted += (item.item_level || 0) * weight;
      }
      let baseIlvl = totalWeighted / TOTAL_GEAR_WEIGHT;

      for (const [slot, item] of Object.entries(items)) {
        if (slot === "tabard" || slot === "shirt") continue;
        const gemCount = item.gems ? item.gems.length : 0;
        const isRequired = GEM_CONFIG.requiredSlots.includes(slot);

        if (isRequired) {
          if (gemCount === 0) {
            penalty += GEM_CONFIG.penaltyMissing;
            missing.push(`Gem: ${slot}`);
          } else if (gemCount > 1) {
            bonus += (gemCount - 1) * GEM_CONFIG.bonusExtra;
          }
        } else {
          if (gemCount > 0) {
            bonus += gemCount * GEM_CONFIG.bonusExtra;
          }
        }
      }

      for (const reqSlot of GEM_CONFIG.requiredSlots) {
        if (!items[reqSlot]) {
          penalty += GEM_CONFIG.penaltyMissing;
          missing.push(`Missing item: ${reqSlot}`);
        }
      }

      for (const [slot, config] of Object.entries(ENCHANT_CONFIG)) {
        if (slot === "offhand" && !items["offhand"]) continue;
        const item = items[slot];
        if (!item || !item.enchant) {
          penalty += config.penalty;
          if (config.flags) missing.push(`Enchant: ${slot}`);
        }
      }

      const finalIlvl = baseIlvl + bonus - penalty;
      return { ilvl: finalIlvl, missing };
    }

    function scoreToResil(score) {
      const keylevel_score = 15;
      const affix_score = 185;
      const num_dungeons = 8;
      if (!score || score <= 0) return 0;
      return ((score / num_dungeons) - affix_score) / keylevel_score;
    }

    async function analyzePlayer(p, data) {
      if (!data) return { name: p.name, realm: p.realm, region: p.region, role: p.role, error: true };

      // Raid
      let heroic = 0, mythic = 0;
      for (const raid of Object.values(data.raid_progression || {})) {
        if (raid.heroic_bosses_killed === raid.total_bosses) heroic++;
        if (raid.mythic_bosses_killed === raid.total_bosses) mythic++;
      }

      // iLvl
      const gearCalc = calculateCustomIlvl(data.gear);
      const unweightedIlvl = data.gear?.item_level_equipped || 0;
      const weightedIlvl = gearCalc.ilvl;
      const ilvlDiff = weightedIlvl - unweightedIlvl;
      const missingUpgrades = gearCalc.missing;

      // Scores & Ranks
      const ranks = data.mythic_plus_ranks || {};
      // FIX: Map queued role to class_dps, class_healer, class_tank
      const roleRankMap = { dps: ranks.class_dps, heal: ranks.class_healer, tank: ranks.class_tank };
      const roleRankObj = roleRankMap[p.role] || ranks.class || ranks.overall || {};
      const specRankRegion = roleRankObj.region || 0;

      const seasons = data.mythic_plus_scores_by_season || [];
      let currentScore = 0;
      let currentScoreColor = "#ccc";

      for (const s of seasons) {
        const allScore = s.scores?.all || 0;
        const allColor = s.segments?.all?.color || "#ffffff";
        if (s.season === CURRENT_SEASON) {
          currentScore = allScore;
          currentScoreColor = allColor;
        }
      }

      const pastSeasonsRaw = [];
      for (const s of seasons) {
        const allScore = s.scores?.all || 0;
        const allColor = s.segments?.all?.color || "#ffffff";
        if (s.season !== CURRENT_SEASON && allScore >= 2000) {
          pastSeasonsRaw.push({ season: s.season, score: allScore, color: allColor, role: null });
        }
      }

      const roleKey = p.role === "tank" ? "tank" : p.role === "heal" ? "healer" : "dps";
      const pastSeasonsRoleRaw = [];
      for (const s of seasons) {
        const roleScore = s.scores?.[roleKey] || 0;
        const roleColor = s.segments?.[roleKey]?.color || "#ffffff";
        if (s.season !== CURRENT_SEASON && roleScore >= 2000) {
          pastSeasonsRoleRaw.push({ season: s.season, score: roleScore, color: roleColor });
        }
      }

      const pastSeasonsWithPerc = await Promise.all(pastSeasonsRaw.map(async s => {
        const perc = await scoreToPercentile(s.score, s.season, p.region);
        return { ...s, perc };
      }));

      const pastSeasonsRoleWithPerc = await Promise.all(pastSeasonsRoleRaw.map(async s => {
        const perc = await scoreToPercentile(s.score, s.season, p.region);
        return { ...s, perc };
      }));

      const sortByPerc = arr => [...arr].sort((a, b) => {
        if (a.perc !== null && b.perc !== null) return a.perc - b.perc;
        if (a.perc !== null) return -1;
        if (b.perc !== null) return 1;
        return b.score - a.score;
      });

      const sortedAny = sortByPerc(pastSeasonsWithPerc);
      const sortedRole = sortByPerc(pastSeasonsRoleWithPerc);

      const bestRoleSeason = sortedRole.length > 0 ? sortedRole[0] : null;
      const bestAnySeason = sortedAny.length > 0 ? sortedAny[0] : null;

      let slot1 = null, slot2 = null;

      if (bestRoleSeason && bestAnySeason) {
        slot1 = bestRoleSeason;
        if (bestRoleSeason.season === bestAnySeason.season) {
          slot2 = sortedAny.length > 1 ? sortedAny[1] : null;
        } else {
          slot2 = bestAnySeason;
        }
      } else if (bestAnySeason) {
        slot1 = bestAnySeason;
        slot2 = sortedAny.length > 1 ? sortedAny[1] : null;
      }

      function fmtSlot(s) {
        if (!s) return null;
        const seasonLabel = s.season.replace('season-', '');
        if (s.perc != null) {
          return `<span style="color:${s.color}" title="${seasonLabel}">${s.perc.toFixed(1)}%</span>`;
        }
        return `<span style="color:${s.color}" title="${seasonLabel}">${fmtScore(s.score)}</span>`;
      }

      const parts = [fmtSlot(slot1), fmtSlot(slot2)].filter(Boolean);
      let topSeasonsStr = "-";
      if (parts.length === 1) topSeasonsStr = parts[0];
      else if (parts.length > 1) topSeasonsStr = `${parts[0]} (${parts[1]})`;

      const bestPastPercentile = slot1?.perc ?? (slot1?.score ? 99 : 99);
      const ksmCount = seasons.filter(s => (s.scores?.all || 0) >= 2000).length;

      // Extract and combine all runs
      const highestRuns = data.mythic_plus_highest_level_runs || [];
      const bestRuns = data.mythic_plus_best_runs || [];
      const altRuns = data.mythic_plus_alternate_runs || [];
      const recentRuns = data.mythic_plus_recent_runs || [];
      const weeklyRuns = data.mythic_plus_weekly_highest_level_runs || [];
      const prevWeeklyRuns = data.mythic_plus_previous_weekly_highest_level_runs || [];

      const highestUrls = new Set(highestRuns.map(r => r.url).filter(Boolean));
      const allRawRuns = [...highestRuns, ...bestRuns, ...altRuns, ...recentRuns, ...weeklyRuns, ...prevWeeklyRuns];

      const uniqueRunsMap = new Map();
      for (const r of allRawRuns) {
        const rKey = r.url || `${r.short_name}-${r.mythic_level}-${r.clear_time_ms}-${r.completed_at}`;
        if (!uniqueRunsMap.has(rKey)) {
          uniqueRunsMap.set(rKey, r);
        }
      }

      const combinedRuns = Array.from(uniqueRunsMap.values());
      combinedRuns.sort((a, b) => {
        if (b.mythic_level !== a.mythic_level) {
          return b.mythic_level - a.mythic_level;
        }
        const dateA = a.completed_at ? new Date(a.completed_at).getTime() : 0;
        const dateB = b.completed_at ? new Date(b.completed_at).getTime() : 0;
        return dateB - dateA;
      });

      for (const r of combinedRuns) {
        r.isHighest = r.url ? highestUrls.has(r.url) : false;
      }

      let recencyStr = "-";
      let timeRemainingStr = "-";
      let timeRemainingColor = "#dddddd";

      let roleMismatch = false;
      const expectedRole = p.role; // "dps", "heal", "tank"
      let actualMainRole = expectedRole;

      if (bestRuns.length > 0) {
        for (const r of bestRuns) {
          let runRole = "";
          if (r.role) {
            runRole = r.role.toLowerCase();
          } else if (r.roster) {
            const me = r.roster.find(m => m.character && m.character.name && m.character.name.toLowerCase() === p.name.toLowerCase());
            if (me && me.role) runRole = me.role.toLowerCase();
          }

          if (runRole) {
            if (runRole === "healing" || runRole === "healer") runRole = "heal";
            if (runRole === "tanking") runRole = "tank";

            if (expectedRole !== "?" && runRole !== expectedRole) {
              roleMismatch = true;
              actualMainRole = runRole;
              break;
            }
          }
        }

        let daysAgoArr = [];
        const now = Date.now();
        for (const r of bestRuns) {
          if (r.completed_at) {
            const d = new Date(r.completed_at).getTime();
            daysAgoArr.push((now - d) / (1000 * 3600 * 24));
          }
        }
        if (daysAgoArr.length > 0) {
          daysAgoArr.sort((a, b) => a - b);
          const recentRuns = daysAgoArr.slice(0, 4);
          const oldRuns = daysAgoArr.slice(-4);
          const avgRecent = recentRuns.reduce((a, b) => a + b, 0) / recentRuns.length;
          const avgOld = oldRuns.reduce((a, b) => a + b, 0) / oldRuns.length;
          recencyStr = `${Math.round(avgRecent)}-${Math.round(avgOld)}d`;
        }

        let totalRemainingSecs = 0;
        let totalPctRemaining = 0;
        let count = 0;
        let totalKeyLevel = 0;
        for (const r of bestRuns) {
          const parSecs = r.par_time_ms ? r.par_time_ms / 1000 : getDungeonTimer(r.dungeon?.name || r.short_name);
          const clearSecs = r.clear_time_ms ? r.clear_time_ms / 1000 : null;
          if (parSecs !== null && clearSecs !== null) {
            totalRemainingSecs += (parSecs - clearSecs);
            totalPctRemaining += (parSecs - clearSecs) / parSecs;
            totalKeyLevel += (r.mythic_level || 0);
            count++;
          }
        }
        if (count > 0) {
          const avgSecs = totalRemainingSecs / count;
          const avgPct = totalPctRemaining / count;
          const avgKeyLevel = totalKeyLevel / count;
          const isNeg = avgSecs < 0;
          const absSecs = Math.abs(avgSecs);
          const mins = Math.floor(absSecs / 60);
          const secs = Math.floor(absSecs % 60);
          timeRemainingStr = `${isNeg ? "-" : ""}${mins}m ${secs.toString().padStart(2, '0')}s`;
          timeRemainingColor = TimeRemainingScoreColor(avgPct, avgKeyLevel);
        }
      }

      const bestKeyPerDungeon = {};
      for (const r of bestRuns) {
        const shortName = r.dungeon?.short_name || r.short_name || "";
        const fullName = r.dungeon?.name || r.name || "";
        const level = r.mythic_level || 0;
        if (shortName && (!bestKeyPerDungeon[shortName] || level > bestKeyPerDungeon[shortName]))
          bestKeyPerDungeon[shortName] = level;
        if (fullName && (!bestKeyPerDungeon[fullName] || level > bestKeyPerDungeon[fullName]))
          bestKeyPerDungeon[fullName] = level;
      }

      const guild = data.guild?.name || "-";
      const playerClass = data.class || "-";
      const race = data.race || "Unknown";
      const specName = data.active_spec_name || "";

      return {
        name: p.name, realm: p.realm, region: p.region, role: p.role,
        playerClass, race, specName,
        ilvl: unweightedIlvl, weightedIlvl, ilvlDiff, missingUpgrades,
        mythic, heroic, ksmCount,
        currentScore, currentScoreColor, specRankRegion,
        topSeasonsStr, bestPastPercentile,
        recencyStr, timeRemainingStr, timeRemainingColor, guild,
        bestKeyPerDungeon, roleMismatch, actualMainRole,
        combinedRuns,
        error: false
      };
    }

    function getTableHeaders() {
      const cols = [
        { key: "name", label: "Player" },
        { key: "role", label: "Role" },
        { key: "playerClass", label: "Class" },
        { key: "bestPastPercentile", label: "Top Seasons" },
        { key: "_ceSort", label: "CE/AOTC/KSM" },
        { key: "timeRemainingStr", label: "Time Remaining" },
        { key: "recencyStr", label: "Recency" },
        { key: "currentScore", label: "Score" },
        { key: "_dungeons", label: "Dungeons" }
      ];
      return cols;
    }

    function buildRowHtml(p) {
      const key = `${p.name}-${p.realm}`;
      const safeKey = key.replace(/[^a-zA-Z0-9]/g, '_');

      if (p.error) {
        return `<tr data-key="${key}" onclick="openInspector('${key}')"><td>${p.name}-${p.realm}</td><td colspan="8" style="color:#f66">Fetch error</td></tr>`;
      }

      const roleClass = r => r === "dps" ? "role-dps" : r === "heal" ? "role-heal" : r === "tank" ? "role-tank" : "";

      const roleWarning = p.roleMismatch
        ? `<span class="${roleClass(p.actualMainRole)}" style="font-weight:bold; cursor:help" title="Queued as ${p.role}, but plays ${p.actualMainRole} in best runs">*</span>`
        : '';

      const rankDisplay = (p.specRankRegion > 0 && p.specRankRegion <= 99)
        ? `<span style="color:${getRegionClassRankColor(p.specRankRegion)}">#${p.specRankRegion}</span>`
        : "–";
      const rankTitle = p.specRankRegion > 0
        ? `title="Region: #${p.specRankRegion}"`
        : 'title="No rank data"';
      const scoreStr = p.currentScore > 0
        ? `<span style="color:${p.currentScoreColor}">${Math.round(p.currentScore)}</span> <span style="color:#888; font-size:14px;" ${rankTitle}>${rankDisplay}</span>`
        : `<span style="color:#f90">0?</span> <span style="color:#888; font-size:14px;">(–)</span>`;

      let dungeonIcons = "";
      if (DUNGEON_ORDER.length > 0 && p.bestKeyPerDungeon) {
        const allLevels = DUNGEON_ORDER.map(d => p.bestKeyPerDungeon[d.short] || p.bestKeyPerDungeon[d.name] || 0);
        const maxLevel = Math.max(...allLevels, 0);
        const icons = DUNGEON_ORDER.map((d, i) => {
          const lvl = allLevels[i] || null;
          const label = lvl ? `+${lvl}` : `–`;
          const labelColor = lvl
            ? (maxLevel - lvl >= 5 ? '#ffffff' : getKeyLevelColor(lvl))
            : '#666';
          const iconUrl = d.icon_url || '';
          return `<div style="position:relative;display:inline-block;margin:0 3px;vertical-align:middle" title="${d.name}: ${label}">
            <img src="${iconUrl}" width="32" height="32" style="display:block;border:1px solid #444;border-radius:4px">
            <span style="position:absolute;bottom:0;left:0;right:0;text-align:center;font-size:18px;font-weight:bold;color:${labelColor};background:rgba(0,0,0,0.7);line-height:20px;border-radius:0 0 4px 4px; letter-spacing:-1px;">${label}</span>
          </div>`;
        });
        dungeonIcons = icons.join('');
      }

      const dungeonDisplay = `<div style="display:flex;align-items:center;gap:6px;flex-wrap:nowrap;overflow:hidden">${dungeonIcons}</div>`;

      const ceColor = p.mythic >= 1 ? "#ff8000" : "#666";
      const aotcColor = p.heroic >= 1 ? "#a335ee" : "#666";
      const ksmColor = p.ksmCount >= 1 ? "#0070dd" : "#666";
      const progressDisplay = `<span style="color:${ceColor}">${p.mythic}</span> / <span style="color:${aotcColor}">${p.heroic}</span> / <span style="color:${ksmColor}">${p.ksmCount}</span>`;

      const shortClass = CLASS_SHORT[p.playerClass] || p.playerClass;
      const classColor = CLASS_COLORS[p.playerClass] || "#ccc";
      const specStr = SPEC_SHORT[p.specName] || p.specName;

      const ilvlColor = getIlvlColor(p.ilvlDiff);
      const ilvlStr = p.ilvl > 0 ? `<span style="color:${ilvlColor}" title="Weighted iLvl. Unweighted is ${p.ilvl.toFixed(1)} (${p.ilvlDiff >= 0 ? '+' : ''}${p.ilvlDiff.toFixed(1)})">${Math.round(p.weightedIlvl)}</span>` : "";

      const missingStr = p.missingUpgrades && p.missingUpgrades.length > 0
        ? ` <span style="color:#ff7070; font-weight:bold; cursor:help" title="${p.missingUpgrades.join(', ')}">(!)</span>`
        : '';
      const classDisplay = `<span style="color:${classColor}">${shortClass}</span> <span style="color:#aaa">(${ilvlStr} ${specStr})</span>${missingStr}`;

      let baseString = p.name + "-" + p.realm;
      let hasGuild = p.guild && p.guild !== "-";
      let maxLen = hasGuild ? 24 : 21;

      let truncated = baseString.length > maxLen ? baseString.substring(0, maxLen - 1) + '…' : baseString;

      let dashIndex = truncated.indexOf('-');
      let pNameStr = dashIndex > -1 ? truncated.substring(0, dashIndex) : truncated;
      let pRealmStr = dashIndex > -1 ? truncated.substring(dashIndex) : "";

      const guildWarning = hasGuild ? "" : " &lt;&gt;";
      const rawName = `${p.name}-${p.realm}`;

      const nameDisplay = `<span title="${rawName} | ${hasGuild ? 'Guild: ' + p.guild : 'No guild'}" style="white-space:nowrap">${pNameStr}<span style="color:#666">${pRealmStr}</span>${guildWarning}</span>`;

      const resilVal = scoreToResil(p.currentScore);
      const resilColor = p.currentScoreColor || "#ccc";
      const timeRemainingDisplay = p.timeRemainingStr !== "-"
        ? `<span style="color:${p.timeRemainingColor}">${p.timeRemainingStr}</span> <span style="color:${resilColor}">(+${resilVal.toFixed(1)})</span>`
        : "-";

      const mainRowHtml = `<tr data-key="${key}" style="vertical-align:top;" onclick="openInspector('${key}')">
        <td>${nameDisplay}</td>
        <td class="${roleClass(p.role)}">${p.role}${roleWarning}</td>
        <td>${classDisplay}</td>
        <td>${p.topSeasonsStr}</td>
        <td>${progressDisplay}</td>
        <td>${timeRemainingDisplay}</td>
        <td>${p.recencyStr}</td>
        <td>${scoreStr}</td>
        <td style="white-space:normal; overflow:visible;">${dungeonDisplay}</td>
      </tr>`;

      return mainRowHtml;
    }

    function appendPlayerRow(p, containerId, title) {
      let container = document.querySelector(containerId);
      let table = container.querySelector("table");
      if (!table) {
        const cols = getTableHeaders();
        let html = `<h4 style="margin:0 0 12px 0; color:#aaa; font-size:20px;">${title}</h4><table class="peeking-table"><thead><tr>`;
        for (const c of cols) {
          if (c.key === "_dungeons") { html += `<th>${c.label}</th>`; continue; }
          html += `<th onclick="setSort('${c.key}')">${c.label}</th>`;
        }
        html += "</tr></thead><tbody></tbody></table>";
        container.innerHTML = html;
        table = container.querySelector("table");
      }
      const tbody = table.querySelector("tbody");
      tbody.insertAdjacentHTML("beforeend", buildRowHtml(p));
    }

    function renderTable() {
      renderSpecificTable(allPlayersGroup, "#table-area-group", "Group Members");
      renderSpecificTable(allPlayersQueue, "#table-area-queue", "Queue Signups");
    }

    function renderSpecificTable(players, containerId, title) {
      let container = document.querySelector(containerId);
      if (!players || players.length === 0) { container.innerHTML = ""; return; }

      const cols = getTableHeaders();

      let sorted = [...players];
      if (sortCol && sortCol !== "_dungeons") {
        sorted.sort((a, b) => {
          if (sortCol === "_ceSort") {
            const va = (a.mythic ?? 0) * 10000 + (a.heroic ?? 0) * 100 + (a.ksmCount ?? 0);
            const vb = (b.mythic ?? 0) * 10000 + (b.heroic ?? 0) * 100 + (b.ksmCount ?? 0);
            return sortAsc ? va - vb : vb - va;
          }
          let va = a[sortCol] ?? "", vb = b[sortCol] ?? "";
          if (typeof va === "number" && typeof vb === "number") return sortAsc ? va - vb : vb - va;
          return sortAsc ? String(va).localeCompare(String(vb)) : String(vb).localeCompare(String(va));
        });
      }

      let html = `<h4 style="margin:0 0 12px 0; color:#aaa; font-size:20px;">${title}</h4><table class="peeking-table"><thead><tr>`;
      for (const c of cols) {
        if (c.key === "_dungeons") { html += `<th>${c.label}</th>`; continue; }
        const arrow = sortCol === c.key ? (sortAsc ? " ▲" : " ▼") : "";
        html += `<th onclick="setSort('${c.key}')">${c.label}${arrow}</th>`;
      }
      html += "</tr></thead><tbody>";
      for (const p of sorted) {
        html += buildRowHtml(p);
      }
      html += "</tbody></table>";
      container.innerHTML = html;
    }

    function fmtScore(s) {
      return s >= 1000 ? `${(s / 1000).toFixed(1)}k` : `${s}`;
    }

    function setSort(col) {
      if (sortCol === col) sortAsc = !sortAsc;
      else {
        sortCol = col;
        sortAsc = (col === "bestPastPercentile");
      }
      renderTable();
    }

    // ── Side Panel Inspector ────────────────────────────────────────────────────────
    function openInspector(key) {
      const data = rawDataStore[key];
      if (!data) { alert("No raw data for " + key); return; }

      // Highlight row
      document.querySelectorAll('tr').forEach(tr => tr.classList.remove('selected-row'));
      const row = document.querySelector(`tr[data-key="${key}"]`);
      if (row) row.classList.add('selected-row');

      document.getElementById("inspector-placeholder").style.display = "none";
      document.getElementById("inspector-content").style.display = "block";
      document.getElementById("inspector-title").textContent = key.replace('-', ' - ');

      const tabs = [
        { id: "runs", label: "All Runs", fn: () => renderAllRunsTab(data) },
        { id: "scores", label: "Scores", fn: () => renderScoresTab(data) },
        { id: "ranks", label: "Ranks", fn: () => renderRanksTab(data) },
        { id: "gear", label: "Gear", fn: () => renderGearTab(data) },
        { id: "raid", label: "Raid", fn: () => renderRaidTab(data) },
        { id: "talents", label: "Talents", fn: () => renderTalentsTab(data) },
        { id: "raw", label: "Raw JSON", fn: () => renderRawTab(data) },
      ];

      let tabHtml = "";
      tabs.forEach((t, i) => {
        tabHtml += `<button class="tab-btn${i === 0 ? ' active' : ''}" onclick="switchTab('${t.id}', this)">${t.label}</button>`;
      });
      document.getElementById("inspector-tabs").innerHTML = tabHtml;

      window._inspectorTabs = {};
      tabs.forEach(t => { window._inspectorTabs[t.id] = t.fn; });

      document.getElementById("inspector-body").innerHTML = tabs[0].fn();
    }

    function switchTab(id, btn) {
      document.querySelectorAll("#inspector-tabs .tab-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      document.getElementById("inspector-body").innerHTML = window._inspectorTabs[id]();
    }

    function renderScoresTab(data) {
      const seasons = data.mythic_plus_scores_by_season || [];
      if (!seasons.length) return "<em>No season data.</em>";
      let html = '<div class="score-grid">';
      for (const s of seasons) {
        const scores = s.scores || {};
        const isCurrent = s.season === CURRENT_SEASON;
        html += `<div class="score-card" style="${isCurrent ? 'border-color:#fa0' : ''}">
      <h4>${s.season}${isCurrent ? ' ★ CURRENT' : ''}</h4>`;
        for (const [k, v] of Object.entries(scores)) {
          html += `<div class="score-row"><span class="score-label">${k}</span><span class="score-val">${v}</span></div>`;
        }
        if (s.segments) {
          html += `<hr style="border-color:#333;margin:6px 0">`;
          for (const [k, v] of Object.entries(s.segments)) {
            html += `<div class="score-row"><span class="score-label">seg:${k}</span><span class="score-val">${typeof v === 'object' ? v.score ?? JSON.stringify(v) : v}</span></div>`;
          }
        }
        html += "</div>";
      }
      html += "</div>";
      return html;
    }

    function renderAllRunsTab(data) {
      const highestRuns = data.mythic_plus_highest_level_runs || [];
      const bestRuns = data.mythic_plus_best_runs || [];
      const altRuns = data.mythic_plus_alternate_runs || [];
      const recentRuns = data.mythic_plus_recent_runs || [];
      const weeklyRuns = data.mythic_plus_weekly_highest_level_runs || [];
      const prevWeeklyRuns = data.mythic_plus_previous_weekly_highest_level_runs || [];

      const highestUrls = new Set(highestRuns.map(r => r.url).filter(Boolean));
      const allRawRuns = [...highestRuns, ...bestRuns, ...altRuns, ...recentRuns, ...weeklyRuns, ...prevWeeklyRuns];

      const uniqueRunsMap = new Map();
      for (const r of allRawRuns) {
        const key = r.url || `${r.short_name}-${r.mythic_level}-${r.clear_time_ms}-${r.completed_at}`;
        if (!uniqueRunsMap.has(key)) {
          uniqueRunsMap.set(key, r);
        }
      }

      const combinedRuns = Array.from(uniqueRunsMap.values());

      combinedRuns.sort((a, b) => {
        if (b.mythic_level !== a.mythic_level) {
          return b.mythic_level - a.mythic_level;
        }
        const dateA = a.completed_at ? new Date(a.completed_at).getTime() : 0;
        const dateB = b.completed_at ? new Date(b.completed_at).getTime() : 0;
        return dateB - dateA;
      });

      if (!combinedRuns.length) return `<em>No run data available.</em>`;

      const maxRunLevel = Math.max(...combinedRuns.map(r => r.mythic_level || 0), 0);

      let html = `<table class="run-table"><thead><tr>
        <th>Dungeon</th><th style="text-align:center;">Best</th><th>Time</th><th>Day</th>
      </tr></thead><tbody>`;

      for (const r of combinedRuns) {
        const isHighest = r.url ? highestUrls.has(r.url) : false;
        const dateStr = timeAgo(r.completed_at);

        const diffMs = r.clear_time_ms - r.par_time_ms;
        const isTimed = diffMs <= 0;
        const absDiffSec = Math.floor(Math.abs(diffMs) / 1000);
        const m = Math.floor(absDiffSec / 60);
        const s = (absDiffSec % 60).toString().padStart(2, '0');
        const sign = isTimed ? "-" : "+";
        const diffColor = isTimed ? "#70ff70" : "#ff7070";
        const diffHtml = `<span style="color:${diffColor}; font-weight:bold;">${sign}${m}:${s}</span>`;

        const shortName = r.dungeon?.short_name || r.short_name || "-";
        const fullName = r.dungeon?.name || r.name || "-";
        const lvl = r.mythic_level;
        const label = `+${lvl}`;
        const labelColor = (maxRunLevel - lvl >= 5) ? '#ffffff' : getKeyLevelColor(lvl);

        let iconUrl = r.dungeon?.icon_url || "";
        if (!iconUrl) {
          const dInfo = DUNGEON_ORDER.find(d => d.short === shortName || d.name === fullName);
          if (dInfo) iconUrl = dInfo.icon_url;
        }

        const iconHtml = iconUrl ? `<div style="position:relative;display:inline-block;margin:0 3px;vertical-align:middle" title="${fullName}: ${label}">
          <img src="${iconUrl}" width="32" height="32" style="display:block;border:1px solid #444;border-radius:4px">
          <span style="position:absolute;bottom:0;left:0;right:0;text-align:center;font-size:15px;font-weight:bold;color:${labelColor};background:rgba(0,0,0,0.7);line-height:18px;border-radius:0 0 4px 4px; letter-spacing:-1px;">${label}</span>
        </div>` : `<span style="color:${labelColor}; font-weight:bold;">${label}</span>`;

        const dungeonDisplay = `<div style="display:flex;align-items:center;gap:8px;">${iconHtml}<span style="font-size:15px;">${shortName}</span></div>`;
        const bestHtml = isHighest ? `<span style="color:#70ff70; font-weight:bold;">✓</span>` : `<span style="color:#666">✗</span>`;

        html += `<tr>
          <td>${dungeonDisplay}</td>
          <td style="text-align:center;">${bestHtml}</td>
          <td>${diffHtml}</td>
          <td>${dateStr}</td>
        </tr>`;
      }
      html += "</tbody></table>";
      return html;
    }

    function renderRanksTab(data) {
      const current = data.mythic_plus_ranks || {};
      const previous = data.previous_mythic_plus_ranks || {};

      function rankSection(rankData, label) {
        if (!Object.keys(rankData).length) return `<em>No ${label} data.</em>`;
        let html = `<h4 style="color:#aaa">${label}</h4><div class="ranks-grid">`;
        for (const [category, ranks] of Object.entries(rankData)) {
          html += `<div class="rank-card"><h4>${category}</h4>`;
          for (const [scope, val] of Object.entries(ranks)) {
            html += `<div class="score-row"><span class="score-label">${scope}</span><span class="score-val">${val}</span></div>`;
          }
          html += "</div>";
        }
        html += "</div>";
        return html;
      }

      return rankSection(current, "Current Season Ranks") + "<br>" + rankSection(previous, "Previous Season Ranks");
    }

    function renderGearTab(data) {
      const gear = data.gear;
      if (!gear) return "<em>No gear data.</em>";
      let html = `<p>Item Level Equipped: <strong>${gear.item_level_equipped}</strong> | Score: <strong>${gear.item_level_total}</strong></p>`;
      html += `<table class="gear-table"><thead><tr>
        <th>Slot</th><th>Name</th><th>iLvl</th><th>Enchant</th><th>Gems</th>
      </tr></thead><tbody>`;
      for (const [slot, item] of Object.entries(gear.items || {})) {
        if (!item) continue;
        const gems = (item.gems || []).map(g => g.id || g).join(", ");
        html += `<tr>
          <td>${slot}</td>
          <td>${item.name || "-"}</td>
          <td>${item.item_level || "-"}</td>
          <td>${item.enchant ? "✓" : "-"}</td>
          <td>${gems || "-"}</td>
        </tr>`;
      }
      html += "</tbody></table>";
      return html;
    }

    function renderRaidTab(data) {
      const raids = data.raid_progression || {};
      if (!Object.keys(raids).length) return "<em>No raid data.</em>";
      let html = `<table class="raid-table"><thead><tr>
        <th>Raid</th><th>LFR</th><th>Normal</th><th>Heroic</th><th>Mythic</th><th>Total</th>
      </tr></thead><tbody>`;
      for (const [raid, info] of Object.entries(raids)) {
        const total = info.total_bosses;
        const lfr = info.lfr_bosses_killed ?? 0;
        const norm = info.normal_bosses_killed ?? 0;
        const hc = info.heroic_bosses_killed ?? 0;
        const myth = info.mythic_bosses_killed ?? 0;
        html += `<tr>
          <td>${raid}</td>
          <td>${lfr}/${total}</td>
          <td>${norm}/${total}</td>
          <td>${hc}/${total}</td>
          <td>${myth}/${total}</td>
          <td>${total}</td>
        </tr>`;
      }
      html += "</tbody></table>";
      return html;
    }

    function renderTalentsTab(data) {
      const talents = data.talents;
      if (!talents) return "<em>No talent data.</em>";
      if (Array.isArray(talents)) {
        let html = "";
        for (const loadout of talents) {
          html += `<div style="margin-bottom:12px;padding:12px;border:1px solid #333;border-radius:4px;background:#222;">
            <strong>${loadout.name || "Loadout"}</strong> — ${loadout.spec_name || ""} ${loadout.class_name || ""}<br>
            <span style="color:#888;font-size:14px">${loadout.loadout_text || ""}</span>
          </div>`;
        }
        return html || "<em>Empty talent list.</em>";
      }
      return `<pre>${JSON.stringify(talents, null, 2)}</pre>`;
    }

    function renderRawTab(data) {
      return `<pre style="white-space: pre-wrap; word-wrap: break-word;">${JSON.stringify(data, null, 2)}</pre>`;
    }

    `
      Similar to how the keylevel for each best dungeon is displayed on top of the dungeon icon, also add the numbers 1-8 at
      the top of the icon(smaller font) to indicate the most recent dungeon(1) to the least recent dungeon(8).The idea is
      to see in what order the dungeons were timed.Also add functionality such that it is possible to sort the table by
      Dungeon, for now this should just sort by the player's highest completed keylevel, and in case of a tie, which run was
      fastest(relative to the dungeons timer)
    `
  </script>
</body>
